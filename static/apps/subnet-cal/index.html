<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subnet Mask 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    /* ── 입력 패널 ── */
    .input-panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 720px;
      margin: 0 auto 28px;
    }
    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label {
      font-size: 0.78rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-group input, .input-group select {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 9px 14px;
      font-size: 0.95rem;
      font-family: 'Consolas', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: #38bdf8;
    }
    .input-group input { width: 200px; }
    .input-group select { width: 200px; cursor: pointer; }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-primary:hover { background: #38bdf8; }
    .btn-secondary { background: #334155; color: #cbd5e1; }
    .btn-secondary:hover { background: #475569; }

    /* ── 결과 카드 ── */
    .result-panel {
      max-width: 720px;
      margin: 0 auto 28px;
      display: none;
    }
    .result-panel.show { display: block; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 18px;
    }
    .card .label {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card .value {
      font-size: 1.05rem;
      font-family: 'Consolas', monospace;
      color: #f1f5f9;
      font-weight: 600;
    }
    .card.highlight { border-color: #0ea5e9; background: #0c2340; }
    .card.highlight .value { color: #38bdf8; font-size: 1.3rem; }
    .card.green { border-color: #22c55e; background: #052e16; }
    .card.green .value { color: #4ade80; }
    .card.orange { border-color: #f97316; background: #2c1206; }
    .card.orange .value { color: #fb923c; }
    .card.purple { border-color: #a855f7; background: #1a0a2e; }
    .card.purple .value { color: #c084fc; }

    /* 비트맵 */
    .bitmap-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    .bitmap-title {
      font-size: 0.78rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .bitmap {
      display: flex;
      gap: 2px;
      flex-wrap: nowrap;
    }
    .bit-group {
      display: flex;
      gap: 2px;
      margin-right: 8px;
    }
    .bit {
      width: 22px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-family: 'Consolas', monospace;
      font-weight: 700;
      transition: background 0.3s;
    }
    .bit.one  { background: #0ea5e9; color: #fff; }
    .bit.zero { background: #1e3a5f; color: #64748b; }

    .octet-labels {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
    }
    .octet-label {
      width: 22px;
      text-align: center;
      font-size: 0.6rem;
      color: #475569;
    }
    .octet-label.gap { width: 10px; }

    /* ── 전체 테이블 ── */
    .table-panel {
      max-width: 1100px;
      margin: 0 auto;
    }
    .table-title {
      font-size: 1rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #334155; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead tr {
      background: #1e293b;
    }
    thead th {
      padding: 10px 14px;
      text-align: left;
      color: #64748b;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #1e293b;
      transition: background 0.15s;
      cursor: pointer;
    }
    tbody tr:hover { background: #1e293b; }
    tbody tr.active { background: #0c2340 !important; }
    tbody tr.active td { color: #38bdf8; }
    tbody td {
      padding: 9px 14px;
      font-family: 'Consolas', monospace;
      color: #cbd5e1;
      white-space: nowrap;
    }
    tbody td:first-child { color: #38bdf8; font-weight: 700; }
    .cidr-badge {
      display: inline-block;
      background: #0ea5e922;
      color: #38bdf8;
      border: 1px solid #0ea5e944;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .bar-wrap {
      width: 80px;
      height: 8px;
      background: #1e3a5f;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0ea5e9, #22d3ee);
      border-radius: 4px;
    }
    .tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .tag-a { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .tag-b { background: #0ea5e922; color: #38bdf8; border: 1px solid #0ea5e944; }
    .tag-c { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; }
    .tag-host { background: #f9731622; color: #fb923c; border: 1px solid #f9731644; }
    .tag-lo { background: #64748b22; color: #94a3b8; border: 1px solid #64748b44; }

    .error-msg {
      color: #f87171;
      background: #2c1212;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 16px;
      margin-top: 10px;
      font-size: 0.88rem;
    }
    .info-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .info-badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<h1>🌐 Subnet Mask 계산기</h1>
<p class="subtitle">IP 주소와 CIDR(또는 서브넷 마스크)를 입력하거나, 아래 전체 표에서 행을 클릭하세요.</p>

<!-- 입력 패널 -->
<div class="input-panel">
  <div class="input-row">
    <div class="input-group">
      <label>IP 주소</label>
      <input type="text" id="ipInput" placeholder="예) 192.168.1.100" value="192.168.1.100">
    </div>
    <div class="input-group">
      <label>CIDR 접두사</label>
      <select id="cidrSelect">
        <!-- JS로 채움 -->
      </select>
    </div>
    <div class="input-group">
      <label>서브넷 마스크 직접입력</label>
      <input type="text" id="maskInput" placeholder="예) 255.255.255.0">
    </div>
    <button class="btn btn-primary" onclick="calculate()">계산</button>
    <button class="btn btn-secondary" onclick="reset()">초기화</button>
  </div>
  <div id="errorMsg" class="error-msg" style="display:none;"></div>
</div>

<!-- 결과 패널 -->
<div class="result-panel" id="resultPanel">
  <div class="result-grid" id="resultGrid"></div>
  <div class="bitmap-wrap">
    <div class="bitmap-title">서브넷 마스크 비트맵 (32비트)</div>
    <div class="octet-labels" id="octetLabels"></div>
    <div class="bitmap" id="bitmapRow"></div>
  </div>
  <div class="info-row" id="infoRow"></div>
</div>

<!-- 전체 CIDR 표 -->
<div class="table-panel">
  <div class="table-title">📋 전체 CIDR 서브넷 참조표 (클릭 시 상세 계산)</div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>CIDR</th>
          <th>서브넷 마스크</th>
          <th>네트워크 비트</th>
          <th>호스트 비트</th>
          <th>총 IP 수</th>
          <th>사용 가능 호스트</th>
          <th>사용 비율</th>
          <th>클래스</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// ─── 유틸 함수 ───────────────────────────────────────────────
function ipToLong(ip) {
  const parts = ip.split('.');
  if (parts.length !== 4) return NaN;
  let n = 0;
  for (const p of parts) {
    const v = parseInt(p, 10);
    if (isNaN(v) || v < 0 || v > 255) return NaN;
    n = (n << 8) | v;
  }
  return n >>> 0;
}

function longToIp(n) {
  n = n >>> 0;
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}

function cidrToMask(cidr) {
  if (cidr === 0) return 0;
  return (0xffffffff << (32 - cidr)) >>> 0;
}

function maskToCidr(mask) {
  let n = mask >>> 0, c = 0;
  while (n & 0x80000000) { c++; n = (n << 1) >>> 0; }
  return c;
}

function calcSubnet(ipLong, cidr) {
  const mask    = cidrToMask(cidr);
  const network = (ipLong & mask) >>> 0;
  const broadcast = (network | (~mask >>> 0)) >>> 0;
  const firstHost = cidr < 31 ? (network + 1) >>> 0 : network;
  const lastHost  = cidr < 31 ? (broadcast - 1) >>> 0 : broadcast;
  const total     = Math.pow(2, 32 - cidr);
  const usable    = cidr < 31 ? Math.max(0, total - 2) : total;
  return { mask, network, broadcast, firstHost, lastHost, total, usable };
}

// ─── CIDR 선택 드롭다운 초기화 ───────────────────────────────
const cidrSelect = document.getElementById('cidrSelect');
for (let i = 0; i <= 32; i++) {
  const opt = document.createElement('option');
  opt.value = i;
  const mask = cidrToMask(i);
  opt.textContent = `/${i}  (${longToIp(mask)})`;
  if (i === 24) opt.selected = true;
  cidrSelect.appendChild(opt);
}

// 서브넷 마스크 입력 시 CIDR 자동 동기
document.getElementById('maskInput').addEventListener('input', function() {
  const m = ipToLong(this.value.trim());
  if (!isNaN(m)) {
    const c = maskToCidr(m);
    cidrSelect.value = c;
  }
});
cidrSelect.addEventListener('change', function() {
  const mask = cidrToMask(parseInt(this.value));
  document.getElementById('maskInput').value = longToIp(mask);
});

// ─── 계산 ────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function calculate(ipStr, cidr) {
  hideError();
  if (ipStr === undefined) {
    ipStr = document.getElementById('ipInput').value.trim();
    cidr = parseInt(cidrSelect.value);
  }
  if (!ipStr) { showError('IP 주소를 입력해주세요.'); return; }
  const ipLong = ipToLong(ipStr);
  if (isNaN(ipLong)) { showError('올바르지 않은 IP 주소 형식입니다.'); return; }
  if (isNaN(cidr) || cidr < 0 || cidr > 32) { showError('CIDR 값이 잘못되었습니다.'); return; }

  const s = calcSubnet(ipLong, cidr);
  renderResult(ipStr, ipLong, cidr, s);

  // 테이블 행 강조
  document.querySelectorAll('#tableBody tr').forEach(tr => tr.classList.remove('active'));
  const row = document.querySelector(`#tableBody tr[data-cidr="${cidr}"]`);
  if (row) { row.classList.add('active'); }
}

function reset() {
  document.getElementById('ipInput').value = '192.168.1.100';
  cidrSelect.value = 24;
  document.getElementById('maskInput').value = '';
  document.getElementById('resultPanel').classList.remove('show');
  document.querySelectorAll('#tableBody tr').forEach(tr => tr.classList.remove('active'));
  hideError();
}

function renderResult(ipStr, ipLong, cidr, s) {
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');

  // 카드
  const grid = document.getElementById('resultGrid');
  grid.innerHTML = '';
  const cards = [
    { label: 'CIDR 표기',      value: `${ipStr}/${cidr}`,      cls: 'highlight' },
    { label: '서브넷 마스크',    value: longToIp(s.mask),         cls: '' },
    { label: '와일드카드 마스크', value: longToIp(~s.mask >>> 0),  cls: '' },
    { label: '네트워크 주소',    value: longToIp(s.network),      cls: 'green' },
    { label: '브로드캐스트 주소', value: longToIp(s.broadcast),    cls: 'orange' },
    { label: '첫 번째 호스트',   value: cidr < 31 ? longToIp(s.firstHost) : '(없음)', cls: '' },
    { label: '마지막 호스트',    value: cidr < 31 ? longToIp(s.lastHost)  : '(없음)', cls: '' },
    { label: '총 IP 수',        value: s.total.toLocaleString(), cls: '' },
    { label: '사용 가능 호스트', value: s.usable.toLocaleString(), cls: 'purple' },
    { label: '네트워크 비트',    value: `${cidr} bit`,            cls: '' },
    { label: '호스트 비트',      value: `${32 - cidr} bit`,       cls: '' },
    { label: '입력 IP (10진)',   value: ipLong >>> 0,             cls: '' },
  ];
  for (const c of cards) {
    const div = document.createElement('div');
    div.className = `card ${c.cls}`;
    div.innerHTML = `<div class="label">${c.label}</div><div class="value">${c.value}</div>`;
    grid.appendChild(div);
  }

  // 비트맵
  const maskBin = (s.mask >>> 0).toString(2).padStart(32, '0');
  const bitmapRow = document.getElementById('bitmapRow');
  const octetLabels = document.getElementById('octetLabels');
  bitmapRow.innerHTML = '';
  octetLabels.innerHTML = '';

  for (let oct = 0; oct < 4; oct++) {
    const group = document.createElement('div');
    group.className = 'bit-group';
    for (let b = 0; b < 8; b++) {
      const idx = oct * 8 + b;
      const bit = document.createElement('div');
      bit.className = `bit ${maskBin[idx] === '1' ? 'one' : 'zero'}`;
      bit.textContent = maskBin[idx];
      group.appendChild(bit);
      // 라벨
      const lbl = document.createElement('div');
      lbl.className = 'octet-label';
      lbl.textContent = maskBin[idx];
      octetLabels.appendChild(lbl);
    }
    if (oct < 3) {
      const gap = document.createElement('div');
      gap.className = 'octet-label gap';
      octetLabels.appendChild(gap);
    }
    bitmapRow.appendChild(group);
  }

  // 정보 배지
  const info = document.getElementById('infoRow');
  info.innerHTML = `
    <span class="info-badge">🔵 네트워크 비트: ${cidr}개 (파란색)</span>
    <span class="info-badge">⚫ 호스트 비트: ${32 - cidr}개 (어두운색)</span>
    <span class="info-badge">📡 서브넷 범위: ${longToIp(s.network)} ~ ${longToIp(s.broadcast)}</span>
  `;
}

// ─── 전체 CIDR 표 생성 ──────────────────────────────────────
function classTag(cidr) {
  if (cidr <= 8)  return '<span class="tag tag-a">Class A</span>';
  if (cidr <= 16) return '<span class="tag tag-b">Class B</span>';
  if (cidr <= 24) return '<span class="tag tag-c">Class C</span>';
  if (cidr === 32) return '<span class="tag tag-lo">Loopback</span>';
  return '<span class="tag tag-host">Host 분할</span>';
}

const tbody = document.getElementById('tableBody');
for (let c = 0; c <= 32; c++) {
  const mask     = cidrToMask(c);
  const total    = Math.pow(2, 32 - c);
  const usable   = c < 31 ? Math.max(0, total - 2) : total;
  const pct      = Math.round((c / 32) * 100);

  const tr = document.createElement('tr');
  tr.dataset.cidr = c;
  tr.innerHTML = `
    <td><span class="cidr-badge">/${c}</span></td>
    <td>${longToIp(mask)}</td>
    <td>${c}</td>
    <td>${32 - c}</td>
    <td>${total.toLocaleString()}</td>
    <td>${usable.toLocaleString()}</td>
    <td>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span style="color:#64748b;font-size:0.75rem;">${pct}%</span>
      </div>
    </td>
    <td>${classTag(c)}</td>
  `;
  tr.addEventListener('click', () => {
    const ip = document.getElementById('ipInput').value.trim() || '192.168.1.100';
    document.getElementById('ipInput').value = ip;
    cidrSelect.value = c;
    document.getElementById('maskInput').value = longToIp(mask);
    calculate(ip, c);
  });
  tbody.appendChild(tr);
}

// 초기 계산 실행
calculate('192.168.1.100', 24);
</script>
</body>
</html>
