<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compound Interest Calculator</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b1020;color:#eef2ff;margin:0;padding:32px}
    .wrap{max-width:860px;margin:0 auto}
    .card{background:#121a31;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px}
    h1{margin-top:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    label{display:block;font-size:14px;color:#9fb0d6;margin-bottom:6px} input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:#0f1730;color:#fff}
    button{margin-top:16px;padding:12px 18px;border:0;border-radius:12px;background:linear-gradient(135deg,#7c9cff,#9b7cff);color:#fff;font-weight:700;cursor:pointer}
    .result{margin-top:18px;padding:16px;border-radius:14px;background:#17213f}
    a{color:#c9d7ff}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/">← Back to Poineix</a></p>
    <div class="card">
      <h1>Compound Interest Calculator</h1>
      <p>Estimate future value with recurring monthly contributions.</p>
      <div class="grid">
        <div><label>Initial Amount</label><input id="principal" type="number" value="1000000"></div>
        <div><label>Monthly Contribution</label><input id="monthly" type="number" value="300000"></div>
        <div><label>Annual Return (%)</label><input id="rate" type="number" value="7" step="0.1"></div>
        <div><label>Years</label><input id="years" type="number" value="10"></div>
      </div>
      <button onclick="calc()">Calculate</button>
      <div class="result" id="result">Future value will appear here.</div>
    </div>
  </div>
  <script>
    function fmt(n){return new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(n)}
    function calc(){
      const p=+document.getElementById('principal').value||0
      const m=+document.getElementById('monthly').value||0
      const r=(+document.getElementById('rate').value||0)/100/12
      const y=+document.getElementById('years').value||0
      const n=y*12
      let fv=p*Math.pow(1+r,n)
      if(r===0){fv+=m*n}else{fv+=m*((Math.pow(1+r,n)-1)/r)}
      document.getElementById('result').innerHTML=`<strong>Estimated future value:</strong> ${fmt(fv)}`
    }
    calc()
  </script>
</body>
</html>
